name: Rebuild & Deploy Indology Scholars Portal

on:
  schedule:
    # Runs twice a year on June 20th and December 20th at 00:00 UTC
    - cron: '0 0 20 6,12 *'
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
  workflow_dispatch: {} # Allows manual one-click execution from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Latest Conference Programs
        run: |
          python fetch_latest_programs.py

      - name: Rebuild & Populate SQLite Database
        run: |
          python scratch/export_presentation_id_manifest.py --out scratch/ci_manifest_before.csv
          python build_and_populate_db.py
          python scratch/export_presentation_id_manifest.py --out scratch/ci_manifest_after.csv
          python scratch/compare_id_manifests.py scratch/ci_manifest_before.csv scratch/ci_manifest_after.csv --out analytics_output/id_stability_audit.json --csv-out analytics_output/id_stability_changed_ids.csv

      - name: Generate Comparative Statistical Reports & CSVs
        run: |
          python generate_analytics.py
          python article/work_title_keywords.py

      - name: Generate JS Configs (if any remain)
        run: |
          python generate_site_data.py
          python generate_network_json.py
          python generate_lod.py

      - name: Generate Static Pages for Individual Scholars
        run: |
          python generate_scholars_pages.py

      - name: Generate Publication & SEO Pages
        run: |
          python generate_publication_pages.py

      - name: Validate Publication Build
        run: |
          python validate_publication.py
          python article/check_ppv_numbers.py
          python article/check_anonymity.py

      - name: Commit & Push Compiled Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only changed datasets, database, caching, and static pages
          git add html_cache/*.html conferences.db site_data.json site_data_summary.json site_data_scholars.json site_data_timeline.json site_data_network.json public_ids.json analytics_output/*.csv analytics_output/*.json indology_scholars_analytics.md s/*.html
          git add article/hypothesis_output/*.csv article/hypothesis_output/*.json article/hypothesis_output/*.md article/figures/*.svg
          git add assets/*.png assets/*.svg assets/*.js conferences/*.html p/*.html generations/*.html themes/*.html topics/*.html meso/*.html gumilyov/*.html videos/*.html findings/*.html keywords/*.html cities/*.html institutions/*.html
          git add sitemap*.xml robots.txt site.webmanifest offline.html service-worker.js search.html search-index.json CITATION.cff datapackage.json data_dictionary.md
          git add 404.html en.html download-data.html data-quality.html methodology.html data-sources.html known-limitations.html how-to-cite.html metrics-guide.html classification-criteria.html networks.html index.html
          
          # Check if there are changes before committing to avoid empty commit errors
          if git diff-index --quiet HEAD --; then
            echo "No new changes detected. Database is up-to-date!"
          else
            git commit -m "Auto-rebuilt indology database, analytics and site payload [skip ci]"
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Pages Artifact
        run: |
          python prepare_pages_artifact.py

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
