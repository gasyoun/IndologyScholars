name: Rebuild & Deploy Indology Scholars Portal

on:
  schedule:
    # Runs twice a year on June 20th and December 20th at 00:00 UTC
    - cron: '0 0 20 6,12 *'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'README_RU.md'
      - 'CHANGELOG.md'
      - 'ai_state.json'
  workflow_dispatch: {} # Allows manual one-click execution from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch Latest Conference Programs
        run: |
          python fetch_latest_programs.py

      - name: Rebuild & Populate SQLite Database
        run: |
          python build_and_populate_db.py

      - name: Generate Comparative Statistical Reports & CSVs
        run: |
          python generate_analytics.py

      - name: Serialize Data Structure for Dashboard
        run: |
          python generate_site_data.py

      - name: Commit & Push Compiled Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only changed datasets, database and caching
          git add html_cache/*.html conferences.db site_data.js analytics_output/*.csv indology_scholars_analytics.md
          
          # Check if there are changes before committing to avoid empty commit errors
          if git diff-index --quiet HEAD --; then
            echo "No new changes detected. Database is up-to-date!"
          else
            git commit -m "Auto-rebuilt indology database, analytics and site payload [skip ci]"
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
