<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#101513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="IndologyScholars">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Офлайн | Российский индологический научный архив</title>
    <link rel="icon" href="/IndologyScholars/assets/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/IndologyScholars/site.webmanifest">
    <link rel="apple-touch-icon" href="/IndologyScholars/assets/apple-touch-icon.png">
    <script defer src="/IndologyScholars/assets/pwa.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #101513;
            --panel: #171e1b;
            --border: #2b3631;
            --text: #e7ece8;
            --muted: #b3beb7;
            --accent: #62ae92;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 1.25rem;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.55;
        }
        main {
            width: min(560px, 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            padding: clamp(1.4rem, 5vw, 2.5rem);
        }
        .status {
            margin: 0 0 0.6rem;
            color: var(--accent);
            font-size: 0.86rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        h1 {
            margin: 0 0 0.9rem;
            font-size: clamp(1.65rem, 5vw, 2.15rem);
            line-height: 1.18;
            letter-spacing: 0;
        }
        p {
            margin: 0 0 1.5rem;
            color: var(--muted);
        }
        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
        }
        a {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.58rem 0.9rem;
            color: var(--text);
            text-decoration: none;
        }
        a:first-child {
            border-color: var(--accent);
            color: #d7f2e8;
        }
        a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <main>
        <p class="status">Офлайн-режим</p>
        <h1>Нет подключения</h1>
        <p>Эта страница еще не сохранена на устройстве. Уже открытые разделы архива и результаты поиска доступны без сети.</p>
        <nav aria-label="Офлайн-навигация">
            <a href="/IndologyScholars/">Архив</a>
            <a href="/IndologyScholars/search.html">Поиск</a>
        </nav>
    </main>
</body>
</html>
