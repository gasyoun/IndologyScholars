<line x1="770.0" y1="62.0" x2="770.0" y2="332.0" stroke="#edf1f5" stroke-width="1"/>
<text x="770.0" y="354.0" class="axis" text-anchor="middle">20</text>
<text x="530.0" y="390.0" class="axis" text-anchor="middle">Разница, процентные пункты; для Джини показано значение ×100</text>
<text x="212.0" y="100.0" class="axis" text-anchor="end" font-weight="700">Ядро ≥5</text>
<line x1="486.6" y1="96.0" x2="762.9" y2="96.0" stroke="#657482" stroke-width="3"/>
<line x1="486.6" y1="90.0" x2="486.6" y2="102.0" stroke="#657482" stroke-width="1.6"/>
