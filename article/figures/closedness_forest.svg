<text x="848.0" y="292.0" class="label" text-anchor="start">p_boot=0.790</text>
<text x="34.0" y="408.0" class="subtitle" text-anchor="start">Чтение: положительные значения означают большую величину метрики у Рериха; отрицательные — у Зографа.</text>
</svg>
