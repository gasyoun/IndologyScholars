<line x1="410.0" y1="62.0" x2="410.0" y2="332.0" stroke="#edf1f5" stroke-width="1"/>
<text x="410.0" y="354.0" class="axis" text-anchor="middle">-10</text>
<line x1="530.0" y1="62.0" x2="530.0" y2="332.0" stroke="#d6dde6" stroke-width="1.4"/>
